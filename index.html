<!DOCTYPE html>
<html lang="no"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Kalkulator</title> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 

    <h1>Kalkulator</h1> <!-- Stor overskrift -->

    <div id="fakultet"> <!-- Seksjon for fakultet -->
        <h2>Fakultet</h2> <!-- Overskrift for denne delen -->
        <form> <!-- Starter et skjema -->
            <input name="tall" placeholder="Tall" type="number"> <!-- Felt der bruker skriver tall -->
            <button>Regn ut fakultet</button> <!-- Knapp for å regne ut -->
        </form> <!-- Slutter skjema -->
        <p>Resultat: <span class="resultat"></span></p> <!-- Viser resultat -->
    </div> <!-- Slutter fakultet-div -->

 
    <div id="fizzbuzz"> <!-- Seksjon for FizzBuzz -->
        <h2>FizzBuzz</h2> <!-- Overskrift -->
        <input type="number" placeholder="Tall"> <!-- Input for tall -->
        <button>Beregn</button> <!-- Knapp -->
        <p>Resultat: <span class="resultat"></span></p> <!-- Viser resultat -->
    </div> <!-- Slutter fizzbuzz-div -->

    <div id="fibonacci"> <!-- Seksjon for Fibonacci -->
        <h2>Fibonacci</h2> <!-- Overskrift -->
        <input type="number" placeholder="Tall"> <!-- Input for tall -->
        <button>Beregn</button> <!-- Knapp -->
        <p>Resultat: <span class="resultat"></span></p> <!-- Viser resultat -->
    </div> <!-- Slutter fibonacci-div -->

    <script type="module" src="script.js"></script> <!-- Kobler til JavaScript -->
</body> 
</html>
